<!DOCTYPE html>
<html>
<head>
<title>OrbiFold</title>
<link rel="stylesheet" href="menu.css">
<style>
.oBtn { font-size:11px; padding:2px 5px; cursor:pointer; border:1px solid #aaa;
        background:#f5f5f5; border-radius:2px; }
.oBtn:hover { background:#dde; }
.gIcon { cursor:pointer; border:1px solid #bbb; border-radius:3px; width:50px; height:50px;
         object-fit:contain; }
.gIcon:hover { border-color:#558; }
</style>
<script src="geomH.js"></script>
<script src="geomS.js"></script>
<script src="geomE.js"></script>
<script src="main.js"></script>
</head>
<body onload="init()" onresize="resize()">
<nav>
<ul>
  <li class="dropdown"><a>File</a>
    <ul>
      <li><a download="myImage.png" onclick="goPng(this)">Save PNG</a>
      <li><a onclick="goSave(this)">Save data</a>
    </ul>
  </li>
</ul>
</nav>

<div style="display:flex; align-items:flex-start;">
<div style="width:155px; flex-shrink:0; font-size:13px; padding:4px; overflow-y:auto; max-height:calc(100vh - 30px);">

  <!-- Gallery button -->
  <div style="margin:4px 0 6px 0; border-bottom:1px solid #ccc; padding-bottom:4px;">
    <button onclick="toggleGallery()" style="width:100%; padding:4px; cursor:pointer; font-size:13px;">Gallery</button>
  </div>

  <!-- Orbifold inputs — shared by all three geometries -->
  <div>
    Handles<br>
    <input type="number" id="handle" value="0" style="width:130px" onchange="reDo()"><br>
    Crosscaps<br>
    <input type="number" id="crosscap" value="0" style="width:130px" onchange="reDo()"><br>
    Cones<br>
    <input type="text" id="cone" value="[]" style="width:130px" onchange="reDo()"><br>
    Kalis<br>
    <input type="text" id="kali" value="[[6,3,2]]" style="width:130px" onchange="reDo()">
  </div>

  <!-- Zoom — only shown for H -->
  <div id="hZoomDiv">
    Zoom <span id="zoomVal">1.00</span><br>
    <input type="range" id="zoom" min="0" max="5" value="1" step="0.05"
           style="width:130px" oninput="setZoom()">
  </div>

  <!-- Common tools -->
  <div style="margin-top:6px; border-top:1px solid #ccc; padding-top:4px;">
    <center>
      <img src="icons/undo.png" alt="Undo" onclick="stackUndo()" title="Undo" style="cursor:pointer">
      <img src="icons/redo.png" alt="Redo" onclick="stackRedo()" title="Redo" style="cursor:pointer">
    </center>

    <div style="margin-top:4px;">
      <label title="pan"><img src="icons/pan.png" alt="pan" style="border:1px solid #888; cursor:pointer; vertical-align:middle" onclick="setModeRadio(-1)"></label>
      <input type="radio" name="mode" id="rPan" onchange="setMode(-1)" style="vertical-align:middle">
      <label title="edit (H only)"><img src="icons/arrow.png" alt="edit" style="border:1px solid #888; cursor:pointer; vertical-align:middle" onclick="setModeRadio(0)"></label>
      <input type="radio" name="mode" id="rEdit" onchange="setMode(0)" style="vertical-align:middle"><br>
      <label title="line"><img src="icons/line.png" alt="line" style="border:1px solid #888; cursor:pointer; vertical-align:middle" onclick="setModeRadio(1)"></label>
      <input type="radio" name="mode" id="rLine" onchange="setMode(1)" checked style="vertical-align:middle">
      <label title="polygon"><img src="icons/poly.png" alt="poly" style="border:1px solid #888; cursor:pointer; vertical-align:middle" onclick="setModeRadio(3)"></label>
      <input type="radio" name="mode" id="rPoly" onchange="setMode(3)" style="vertical-align:middle">
    </div>

    Sides: <input type="number" id="ngon" style="width:40px" onchange="setNgon()" value="5" min="3" step="1"><br>

    <input type="color" id="color" onchange="setColor()" value="#000000">
    <label for="color"> Color</label><br>
    <input type="checkbox" id="fill" onchange="setFill()">
    <label for="fill"> Fill</label><br>
    <input type="checkbox" id="grid" onchange="setGrid()" checked>
    <label for="grid"> Grid</label><br>
    <input type="checkbox" id="snap" onchange="setSnap()">
    <label for="snap"> Snap</label>
  </div>

</div>

<div id="canvasDiv" style="flex:1; overflow:hidden; border:3px solid #888">
  <canvas id="myCanvas"
    onclick="mouseClicked(event)"
    onmousemove="mouseMoved(event)"
    onmousedown="mousePressed(event)"
    onmouseup="mouseReleased(event)">
  </canvas>
</div>

</div><!-- end flex row -->

<!-- Gallery overlay — appears over the canvas -->
<div id="galleryPanel" style="display:none; position:fixed; left:167px; top:34px;
     z-index:100; background:white; border:2px solid #888; padding:8px;
     max-height:calc(100vh - 44px); overflow-y:auto; width:316px;
     font-size:12px; box-shadow:5px 5px 16px rgba(0,0,0,0.35);">

  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
    <b style="font-size:13px;">Select Orbifold</b>
    <span onclick="toggleGallery()" style="cursor:pointer; font-size:18px; line-height:1; padding:0 4px;">&#x2715;</span>
  </div>

  <!-- ── Hyperbolic ── -->
  <div style="font-weight:bold; color:#003080; margin:4px 0 3px;">Hyperbolic</div>
  <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px;">
    <img class="gIcon" src="icons/star732.png" title="*732" onclick="selectOrbi(0,0,[],[[7,3,2]])">
    <img class="gIcon" src="icons/732.png"     title="732"  onclick="selectOrbi(0,0,[7,3,2],[])">
    <img class="gIcon" src="icons/star832.png" title="*832" onclick="selectOrbi(0,0,[],[[8,3,2]])">
    <img class="gIcon" src="icons/832.png"     title="832"  onclick="selectOrbi(0,0,[8,3,2],[])">
    <img class="gIcon" src="icons/3star4.png"  title="3*4"  onclick="selectOrbi(0,0,[3],[[4]])">
  </div>

  <!-- ── Euclidean ── -->
  <div style="font-weight:bold; color:#005000; margin:4px 0 3px;">Euclidean</div>
  <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px;">
    <img class="gIcon" src="icons/star632.png"  title="*632"  onclick="selectOrbi(0,0,[],[[6,3,2]])">
    <img class="gIcon" src="icons/632.png"      title="632"   onclick="selectOrbi(0,0,[6,3,2],[])">
    <img class="gIcon" src="icons/star442.png"  title="*442"  onclick="selectOrbi(0,0,[],[[4,4,2]])">
    <img class="gIcon" src="icons/442.png"      title="442"   onclick="selectOrbi(0,0,[4,4,2],[])">
    <img class="gIcon" src="icons/4star2.png"   title="4*2"   onclick="selectOrbi(0,0,[4],[[2]])">
    <img class="gIcon" src="icons/star333.png"  title="*333"  onclick="selectOrbi(0,0,[],[[3,3,3]])">
    <img class="gIcon" src="icons/333.png"      title="333"   onclick="selectOrbi(0,0,[3,3,3],[])">
    <img class="gIcon" src="icons/3star3.png"   title="3*3"   onclick="selectOrbi(0,0,[3],[[3]])">
    <img class="gIcon" src="icons/star2222.png" title="*2222" onclick="selectOrbi(0,0,[],[[2,2,2,2]])">
    <img class="gIcon" src="icons/2star22.png"  title="2*22"  onclick="selectOrbi(0,0,[2],[[2,2]])">
    <img class="gIcon" src="icons/22star.png"   title="22*"   onclick="selectOrbi(0,0,[2,2],[[]])">
    <img class="gIcon" src="icons/22x.png"      title="22&#xd7;" onclick="selectOrbi(0,1,[2,2],[])">
    <img class="gIcon" src="icons/2222.png"     title="2222"  onclick="selectOrbi(0,0,[2,2,2,2],[])">
    <img class="gIcon" src="icons/starstar.png" title="**"    onclick="selectOrbi(0,0,[],[[],[]])">
    <img class="gIcon" src="icons/starx.png"    title="*&#xd7;" onclick="selectOrbi(0,1,[],[[]])">
    <img class="gIcon" src="icons/xx.png"       title="&#xd7;&#xd7;" onclick="selectOrbi(0,2,[],[])">
    <img class="gIcon" src="icons/o.png"        title="o"     onclick="selectOrbi(1,0,[],[])">
  </div>

  <!-- ── Spherical ── -->
  <div style="font-weight:bold; color:#600000; margin:4px 0 3px;">Spherical</div>
  <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px;">
    <img class="gIcon" src="icons/star532.png" title="*532" onclick="selectOrbi(0,0,[],[[5,3,2]])">
    <img class="gIcon" src="icons/532.png"     title="532"  onclick="selectOrbi(0,0,[5,3,2],[])">
    <img class="gIcon" src="icons/star432.png" title="*432" onclick="selectOrbi(0,0,[],[[4,3,2]])">
    <img class="gIcon" src="icons/432.png"     title="432"  onclick="selectOrbi(0,0,[4,3,2],[])">
    <img class="gIcon" src="icons/star332.png" title="*332" onclick="selectOrbi(0,0,[],[[3,3,2]])">
    <img class="gIcon" src="icons/332.png"     title="332"  onclick="selectOrbi(0,0,[3,3,2],[])">
    <img class="gIcon" src="icons/3star2.png"  title="3*2"  onclick="selectOrbi(0,0,[3],[[2]])">
  </div>
  <div style="margin-bottom:4px;">
    n = <input type="number" id="galleryN" value="6" min="2" style="width:38px">
  </div>
  <div style="display:flex; flex-wrap:wrap; gap:4px; margin-bottom:4px;">
    <img class="gIcon" src="icons/star22n.png" title="*22n"      onclick="selectVarS(7)">
    <img class="gIcon" src="icons/22n.png"     title="22n"       onclick="selectVarS(9)">
    <img class="gIcon" src="icons/2starn.png"  title="2*n"       onclick="selectVarS(8)">
    <img class="gIcon" src="icons/nstar.png"   title="n*"        onclick="selectVarS(10)">
    <img class="gIcon" src="icons/nx.png"      title="n&#xd7;"   onclick="selectVarS(11)">
    <img class="gIcon" src="icons/starnn.png"  title="*nn"       onclick="selectVarS(12)">
    <img class="gIcon" src="icons/nn.png"      title="nn"        onclick="selectVarS(13)">
  </div>

</div>

</body>
</html>
