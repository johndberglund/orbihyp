<div style="float:left; width:140px;">
<form>
<br>
Handles
<input type="number" id="handle" value = "0" style="width: 120px" onchange="reDo()"></input>
<br>
Crosscaps
<input type="number" id="crosscap"value = "1" style="width: 120px" onchange="reDo()"></input>
<br>
Cones
<input type="text" id="cone" value = "[7,3,4,6]" style="width: 120px" onchange="reDo()"></input>
<br>
Kalis
<input type="text" id="kali" value = "[]" style="width: 120px" onchange="reDo()"></input>
<br>
</form>

<form>

<br>
<center>
<img src="resources/undo.png" alt="Undo" onclick="goUndo()" title="Undo"></img>
<img src="resources/redo.png" alt="Redo" onclick="goRedo()" title="Redo"></img>
</center>

<div style="float:left">
<label for="pan">
<img src="resources/pan.png" alt="hand" title="pan" style="border: 1px solid black"></img>
</label>
<br>
<input type="radio" id="pan" name="mode" onchange="setMode(-1)" value="pan">
</div>

<div style="float:left">
<label for="edit">
<img src="resources/arrow.png" alt="arrow" title="edit" style="border: 1px solid black"></img>
</label>
<br>
<input type="radio" id="edit" name="mode" onchange="setMode(0)" value="edit">
</div>

<div style="float:left">
<label for="line">
<img src="resources/line.png" alt="Line" title="draw lines" style="border: 1px solid black"></img>
</label>
<br>
<input type="radio" id="line" name="mode" onchange="setMode(1)" value="line" checked>
</div>

<!--
<div style="float:left">
<label for="circle">
<img src="resources/circle.png" alt="Circle" title="draw circles" style="border: 1px solid black"></img>
</label>
<br>
<input type="radio" id="circle" name="mode" onchange="setMode(2)" value="circle">
</div>
-->

<div>
<label for="poly">
<img src="resources/poly.png" alt="Polygon" title="draw polygons" style="border: 1px solid black"></img>
</label>
<br>
<input type="radio" id="poly" name="mode" onchange="setMode(3)" value="poly">
</div>

<label for="ngon">Sides in polygon:</label>
<input type="number" id="ngon" style="width: 40px" onchange="setNgon()" value="5" min="3" step="1">
</form>

<br>
<input type="color" id="color" onchange="setColor()"><label for="color"> Color</label>
<br>
<input type="checkbox" id="fill" onchange="setFill()"><label for="fill">Fill</label>
<br>

<!--
<input type="checkbox" id="snap" onchange="setSnap()"><label for="snap">Snap</label>
<br>
-->

</div>

<div id="canvasDiv" style="max-height: 300px; max-width:256px; overflow: scroll; border:3px solid red">
<canvas id="myCanvas"  style="border:1px solid black;"
 onclick="mouseClicked(event)" onmousemove="mouseMoved(event)" onmousedown="mousePressed(event)" onmouseup="mouseReleased(event)"> </canvas>
</div>
